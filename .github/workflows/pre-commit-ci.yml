name: Prek checks
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv pip install -r requirements-dev.txt
      - uses: j178/prek-action@v2
